services:
  postgres:
    image: postgres:16
    container_name: login_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: login_system
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mailhog:
    image: mailhog/mailhog
    container_name: login_mailhog
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  postgres_data: